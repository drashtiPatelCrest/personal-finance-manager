name: personal_finance_manager
description: "Personal Finance Manager - offline-first finance tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  cryptography: ^2.7.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  go_router: ^15.1.3
  injectable: ^2.5.0
  intl: any

  drift: ^2.26.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.31
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  fl_chart: ^1.2.0
  pdf: ^3.11.3
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
